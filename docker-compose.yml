version: '3.8'

services:
  # --- Microservices ---
  user-service:
    build: ./services/user-service
    ports:
      - "8081:8081"
    networks:
      - poc-network

  checkout-service:
    build: ./services/checkout-service
    ports:
      - "8082:8082"
    networks:
      - poc-network

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "8083:8083"
    networks:
      - poc-network

  # --- Prometheus Pushgateway ---
  pushgateway:
    image: prom/pushgateway:latest
    ports:
      - "9091:9091"
    networks:
      - poc-network

  # --- Prometheus Server ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - poc-network
    depends_on:
      - user-service
      - checkout-service
      - inventory-service
      - pushgateway

  # --- Grafana ---
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - poc-network

  # --- Traffic Generator (Real Users) ---
  traffic-generator:
    image: alpine/curl
    volumes:
      - ./traffic.sh:/traffic.sh
    command: /bin/sh /traffic.sh
    depends_on:
      - user-service
      - checkout-service
      - inventory-service
    networks:
      - poc-network

  # --- QA Automation ---
  qa-automation:
    build: ./qa
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - CHECKOUT_SERVICE_URL=http://checkout-service:8082
      - INVENTORY_SERVICE_URL=http://inventory-service:8083
      - PUSHGATEWAY_URL=pushgateway:9091
    depends_on:
      - user-service
      - checkout-service
      - inventory-service
      - pushgateway
    networks:
      - poc-network

networks:
  poc-network:
    driver: bridge
